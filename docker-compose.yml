version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: blindword-postgres

    environment:
      POSTGRES_DB: blindword
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    restart: unless-stopped

volumes:
  postgres_data: